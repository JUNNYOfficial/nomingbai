name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build
        run: npm run build --prefix frontend
        env:
          # GitHub Pages project site uses /repo-name/ as base path
          # If you set up a custom domain in repo Settings > Pages,
          # change this to '/' and update the API URL below.
          VITE_BASE_PATH: /nomingbai/
          # Replace with your deployed backend URL (e.g. Render/Railway)
          # Leave empty to use relative /api (works when backend is co-hosted)
          VITE_API_BASE_URL: ''

      - name: Add SPA fallback for GitHub Pages
        run: |
          cp frontend/dist/index.html frontend/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
