version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: nomingbai-db
    environment:
      POSTGRES_USER: nomingbai
      POSTGRES_PASSWORD: nomingbai_pass
      POSTGRES_DB: nomingbai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomingbai -d nomingbai"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomingbai-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://nomingbai:nomingbai_pass@db:5432/nomingbai
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
