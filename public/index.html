<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nomingbai</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: #f8fafc; color: #0f172a; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { color: #2563eb; }
    code { background: #e2e8f0; padding: 0.2em 0.4em; border-radius: 4px; }
    .api-box { margin-top: 24px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; }
    .api-box pre { margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>nomingbai</h1>
    <p>这是一个后端优先的网页项目模板，前端通过 API 从后端获取数据。</p>
    <div class="api-box">
      <h2>API 调用</h2>
      <p>后台接口：</p>
      <pre><code>GET /api/</code></pre>
      <pre><code>GET /api/status</code></pre>
      <pre><code>GET /api/data</code></pre>
      <pre><code>POST /api/auth/register</code></pre>
      <pre><code>POST /api/auth/login</code></pre>
      <pre><code>POST /api/agent/invoke</code></pre>

      <div>
        <h3>注册 / 登录</h3>
        <label>用户名 <input id="username" type="text" /></label><br />
        <label>密码 <input id="password" type="password" /></label><br />
        <button id="registerButton">注册</button>
        <button id="loginButton">登录</button>
      </div>

      <div style="margin-top:16px;">
        <h3>Agent 调用</h3>
        <label>提示语 <input id="promptInput" type="text" style="width:100%" /></label><br />
        <button id="invokeButton">调用 Agent</button>
      </div>

      <pre id="result">等待请求...</pre>
    </div>
  </div>

  <script>
    const loadButton = document.getElementById('loadButton');
    const loadDataButton = document.getElementById('loadDataButton');
    const registerButton = document.getElementById('registerButton');
    const loginButton = document.getElementById('loginButton');
    const invokeButton = document.getElementById('invokeButton');
    const result = document.getElementById('result');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const promptInput = document.getElementById('promptInput');

    function getToken() {
      return localStorage.getItem('nomingbai_token');
    }

    function setToken(token) {
      if (token) {
        localStorage.setItem('nomingbai_token', token);
      }
    }

    async function fetchApi(path, options = {}) {
      result.textContent = '正在加载...';
      try {
        const headers = options.headers || {};
        const token = getToken();
        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }
        const response = await fetch(path, { ...options, headers });
        const data = await response.json();
        result.textContent = JSON.stringify(data, null, 2);
        return data;
      } catch (error) {
        result.textContent = '请求失败：' + error.message;
      }
    }

    loadButton.addEventListener('click', () => fetchApi('/api/'));
    loadDataButton.addEventListener('click', () => fetchApi('/api/data'));

    registerButton.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        result.textContent = '请输入用户名和密码进行注册。';
        return;
      }
      await fetchApi('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
    });

    loginButton.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (!username || !password) {
        result.textContent = '请输入用户名和密码进行登录。';
        return;
      }
      const data = await fetchApi('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (data && data.token) {
        setToken(data.token);
      }
    });

    invokeButton.addEventListener('click', () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        result.textContent = '请输入要发送给 Agent 的提示语。';
        return;
      }
      fetchApi('/api/agent/invoke', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
    });
  </script>
</body>
</html>
