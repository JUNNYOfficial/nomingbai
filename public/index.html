<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nomingbai</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: #f8fafc; color: #0f172a; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { color: #2563eb; }
    code { background: #e2e8f0; padding: 0.2em 0.4em; border-radius: 4px; }
    .api-box { margin-top: 24px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px; }
    .api-box pre { margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>nomingbai</h1>
    <p>这是一个后端优先的网页项目模板，前端通过 API 从后端获取数据。</p>
    <div class="api-box">
      <h2>API 调用</h2>
      <p>后台接口：</p>
      <pre><code>GET /api/</code></pre>
      <pre><code>GET /api/status</code></pre>
      <button id="loadButton">获取后端数据</button>
      <pre id="result">等待请求...</pre>
    </div>
  </div>

  <script>
    const button = document.getElementById('loadButton');
    const result = document.getElementById('result');

    button.addEventListener('click', async () => {
      result.textContent = '正在加载...';
      try {
        const response = await fetch('/api/');
        const data = await response.json();
        result.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        result.textContent = '请求失败：' + error.message;
      }
    });
  </script>
</body>
</html>
