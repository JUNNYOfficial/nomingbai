<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nomingbai - 常识 Agent</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f5;
      --bg-tertiary: #eeeeee;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #888888;
      --border: #e0e0e0;
      --border-strong: #cccccc;
      --accent: #000000;
      --accent-hover: #333333;
      --error: #cc0000;
      --success: #006600;
      --radius: 4px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* Header */
    .header {
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.9375rem;
      color: var(--text-secondary);
    }

    /* Layout */
    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    /* Panel */
    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .panel h2 {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg);
      transition: border-color 0.15s ease;
    }

    .form-input::placeholder {
      color: #aaaaaa;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      padding: 10px 18px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--bg-secondary);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-block {
      width: 100%;
      margin-top: 4px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* Examples */
    .examples {
      margin-top: 20px;
    }

    .examples-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .example-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-tag {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      padding: 5px 10px;
      border-radius: var(--radius);
      font-size: 0.8125rem;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .example-tag:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    /* Result */
    .result-area {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
      font-size: 0.8125rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 320px;
      overflow-y: auto;
      color: var(--text-secondary);
    }

    .result-area.is-error {
      color: var(--error);
      background: #fff5f5;
      border-color: #ffcccc;
    }

    .result-area.is-success {
      color: var(--success);
      background: #f5fff5;
      border-color: #ccffcc;
    }

    /* Status dot */
    .status-indicator {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00aa00;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-indicator.pulse {
      animation: pulse 2s infinite;
    }

    /* Loading spinner */
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 24px 16px;
      }

      .main-content {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .header {
        margin-bottom: 32px;
      }

      .panel {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>nomingbai</h1>
      <p>基于常识库的智能 Agent，解答生活中的隐性常识</p>
    </header>

    <div class="main-content">
      <div class="panel">
        <h2>用户认证</h2>
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" class="form-input" placeholder="输入用户名" />
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" class="form-input" placeholder="输入密码" />
        </div>
        <div class="btn-group">
          <button id="registerButton" class="btn btn-primary">
            <span id="registerText">注册</span>
          </button>
          <button id="loginButton" class="btn btn-secondary">
            <span id="loginText">登录</span>
          </button>
        </div>

        <hr class="divider" />

        <h2>Agent 对话</h2>
        <div class="form-group">
          <label for="promptInput">输入你的问题</label>
          <input type="text" id="promptInput" class="form-input" placeholder="例如：一会儿代表多长时间？" />
        </div>
        <button id="invokeButton" class="btn btn-primary btn-block">
          <span id="invokeText">调用 Agent</span>
        </button>

        <div class="examples">
          <div class="examples-title">快速示例</div>
          <div class="example-tags">
            <span class="example-tag" onclick="setPrompt('一会儿代表多长时间？')">一会儿代表多长时间？</span>
            <span class="example-tag" onclick="setPrompt('面试应该提前多久到？')">面试应该提前多久到？</span>
            <span class="example-tag" onclick="setPrompt('马上到是什么意思？')">马上到是什么意思？</span>
            <span class="example-tag" onclick="setPrompt('饭局提前多久合适？')">饭局提前多久合适？</span>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>
          <span class="status-indicator pulse"></span>
          响应结果
        </h2>
        <div id="result" class="result-area">欢迎使用 nomingbai Agent！请先注册或登录，然后输入问题开始对话。</div>
      </div>
    </div>

    <footer class="footer">
      nomingbai &middot; 常识 Agent
    </footer>
  </div>

  <script>
    const registerButton = document.getElementById('registerButton');
    const loginButton = document.getElementById('loginButton');
    const invokeButton = document.getElementById('invokeButton');
    const result = document.getElementById('result');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const promptInput = document.getElementById('promptInput');

    let isLoggedIn = false;

    function getToken() {
      return localStorage.getItem('nomingbai_token');
    }

    function setToken(token) {
      if (token) {
        localStorage.setItem('nomingbai_token', token);
        isLoggedIn = true;
        updateUI();
      }
    }

    function updateUI() {
      const token = getToken();
      if (token) {
        registerButton.style.display = 'none';
        loginButton.textContent = '已登录';
        loginButton.disabled = true;
        invokeButton.disabled = false;
        result.textContent = '登录成功！现在可以开始与 Agent 对话了。';
        result.className = 'result-area is-success';
      } else {
        registerButton.style.display = 'inline-flex';
        loginButton.textContent = '登录';
        loginButton.disabled = false;
        invokeButton.disabled = true;
        result.textContent = '欢迎使用 nomingbai Agent！请先注册或登录，然后输入问题开始对话。';
        result.className = 'result-area';
      }
    }

    function setLoading(button, loading) {
      const text = button.querySelector('span');

      if (loading) {
        text.innerHTML = '<span class="loading"></span>处理中...';
        button.disabled = true;
      } else {
        if (button.id === 'registerButton') {
          text.textContent = '注册';
        } else if (button.id === 'loginButton') {
          text.textContent = '登录';
        } else if (button.id === 'invokeButton') {
          text.textContent = '调用 Agent';
        }
        button.disabled = false;
      }
    }

    async function fetchApi(path, options = {}) {
      try {
        const headers = options.headers || {};
        const token = getToken();
        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }
        const response = await fetch(path, { ...options, headers });
        const data = await response.json();
        return data;
      } catch (error) {
        throw new Error(error.message);
      }
    }

    function showResult(content, isError = false) {
      result.textContent = content;
      result.className = 'result-area' + (isError ? ' is-error' : '');
    }

    registerButton.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showResult('请输入用户名和密码进行注册。', true);
        return;
      }

      setLoading(registerButton, true);
      try {
        const data = await fetchApi('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        showResult('注册成功！现在可以登录了。');
      } catch (error) {
        showResult('注册失败：' + error.message, true);
      } finally {
        setLoading(registerButton, false);
      }
    });

    loginButton.addEventListener('click', async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showResult('请输入用户名和密码进行登录。', true);
        return;
      }

      setLoading(loginButton, true);
      try {
        const data = await fetchApi('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (data.token) {
          setToken(data.token);
          showResult(`登录成功！欢迎回来，${data.username}。\n\n现在可以开始与 Agent 对话了。`);
          result.className = 'result-area is-success';
        } else {
          showResult('登录失败：未收到有效的令牌。', true);
        }
      } catch (error) {
        showResult('登录失败：' + error.message, true);
      } finally {
        setLoading(loginButton, false);
      }
    });

    invokeButton.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();

      if (!prompt) {
        showResult('请输入要发送给 Agent 的问题。', true);
        return;
      }

      if (!getToken()) {
        showResult('请先登录后再使用 Agent。', true);
        return;
      }

      setLoading(invokeButton, true);
      try {
        const data = await fetchApi('/api/agent/invoke', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        showResult(`Agent 回答：\n\n${data.output}\n\n---\n用户：${data.user} | 时间：${new Date(data.createdAt).toLocaleString('zh-CN')}`);
      } catch (error) {
        showResult('Agent 调用失败：' + error.message, true);
      } finally {
        setLoading(invokeButton, false);
      }
    });

    function setPrompt(text) {
      promptInput.value = text;
    }

    // Initialize UI
    updateUI();

    // Auto-focus on prompt input if logged in
    if (getToken()) {
      promptInput.focus();
    }
  </script>
</body>
</html>
